<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NORSU Bayawan-Sta. Catalina Campus</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'dashboard/css/styles.css' %}">
    <link rel="stylesheet" href="{% static 'dashboard/css/navbar.css' %}">
    <link rel="stylesheet" href="{% static 'dashboard/css/footer.css' %}">
    <link rel="stylesheet" href="{% static 'dashboard/css/location.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% block header %}
        {% include 'dashboard/header.html' %}
    {% endblock %}
    {% include 'dashboard/navbar.html' %}
    
    <main class="main-content">
         
        {% block content %}
        {% endblock %}
    </main>

    {% include 'dashboard/footer.html' %}

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Scroll to Top Button - Show/Hide based on scroll position
            const scrollToTopBtn = document.querySelector('.scroll-to-top');
            
            if (scrollToTopBtn) {
                // Hide button initially if at top
                if (window.pageYOffset <= 100) {
                    scrollToTopBtn.style.display = 'none';
                }
                
                window.addEventListener('scroll', function() {
                    if (window.pageYOffset > 100) {
                        scrollToTopBtn.style.display = 'flex';
                    } else {
                        scrollToTopBtn.style.display = 'none';
                    }
                });
            }
            // Mobile menu toggle functionality
            const menuToggleBtn = document.querySelector('.mobile-menu-toggle');
            const mobileNavMenu = document.querySelector('.mobile-nav-menu');
            
            // Header scroll functionality
            const header = document.querySelector('.main-header');
            if (header) {
                window.addEventListener('scroll', function() {
                    let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                    if (scrollTop > 50) {
                        header.style.display = 'none';
                    } else {
                        header.style.display = 'block';
                    }
                });
            }
            
            if (menuToggleBtn && mobileNavMenu) {
                menuToggleBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    menuToggleBtn.classList.toggle('active');
                    mobileNavMenu.classList.toggle('active');
                });

                // Close mobile menu when clicking on links
                const mobileLinks = document.querySelectorAll('.mobile-nav-links a');
                mobileLinks.forEach(link => {
                    link.addEventListener('click', function() {
                        menuToggleBtn.classList.remove('active');
                        mobileNavMenu.classList.remove('active');
                    });
                });

                // Close mobile menu when clicking outside
                document.addEventListener('click', function(event) {
                    const isClickInsideMenu = mobileNavMenu.contains(event.target);
                    const isClickOnToggle = menuToggleBtn.contains(event.target);
                    
                    if (!isClickInsideMenu && !isClickOnToggle && mobileNavMenu.classList.contains('active')) {
                        menuToggleBtn.classList.remove('active');
                        mobileNavMenu.classList.remove('active');
                    }
                });
            }

            // Colleges auto-scroll is now handled by CSS animation
            // No JavaScript needed for arrow navigation

        // Navigation Menu Functionality
        const desktopNavLinks = document.querySelectorAll('.nav-links li');
        const mobileNavLinks = document.querySelectorAll('.mobile-nav-links li');

        // Desktop dropdown functionality
        desktopNavLinks.forEach(link => {
            const topLevelAnchor = link.querySelector(':scope > a');
            if (topLevelAnchor) {
                topLevelAnchor.addEventListener('click', function(e) {
                    const linkText = this.textContent.trim();
                    console.log('Desktop top-level link clicked:', linkText);
                    
                    const hasDropdown = this.textContent.includes('▼');
                    
                    // Only prevent default for dropdown triggers, but let About and other real links work normally
                    if (hasDropdown && !linkText.includes('About')) {
                        const href = this.getAttribute('href');
                        // If it's just an anchor, handle navigation
                        if (href && href.startsWith('#')) {
                            e.preventDefault();
                            const sectionName = linkText.replace(' ▼', '').trim();
                            
                            // Toggle active state
                            desktopNavLinks.forEach(l => l.classList.remove('active'));
                            link.classList.add('active');
                            
                            // Handle navigation based on link text
                            handleNavigation(sectionName);
                        }
                    }
                });
            }
        });

        // Mobile navigation functionality
        mobileNavLinks.forEach(link => {
            const topLevelAnchor = link.querySelector(':scope > a');
            if (topLevelAnchor) {
                topLevelAnchor.addEventListener('click', function(e) {
                    const linkText = this.textContent.trim();
                    console.log('Mobile top-level link clicked:', linkText);
                    
                    const hasDropdown = this.textContent.includes('▼');
                    
                    // Only prevent default for dropdown triggers
                    if (hasDropdown && !linkText.includes('About')) {
                        const href = this.getAttribute('href');
                        if (href && href.startsWith('#')) {
                            e.preventDefault();
                            const sectionName = linkText.replace(' ▼', '').trim();
                            
                            // Close mobile menu after click if needed
                            // (Actually for dropdowns we might want to keep it open, 
                            // but the original code closed it)
                            
                            // Handle navigation
                            handleNavigation(sectionName);
                        }
                    } else {
                        // For regular links, just close mobile menu
                        if (mobileNavMenu) {
                            mobileNavMenu.classList.remove('active');
                        }
                        if (menuToggleBtn) {
                            menuToggleBtn.classList.remove('active');
                        }
                    }
                });
            }
        });

        // Navigation handler function
        function handleNavigation(section) {
            switch(section.toLowerCase()) {
                case 'home':
                    // Let Home link navigate normally
                    window.location.href = '/';
                    break;
                case 'about':
                    scrollToSection('hero-section');
                    break;
                case 'academics':
                    scrollToSection('colleges-section');
                    break;
                case 'admissions':
                    scrollToSection('programs-offered-section');
                    break;
                case 'contacts':
                    scrollToSection('main-footer');
                    break;
                case 'alumni':
                    scrollToSection('alumni');
                    break;
                default:
                    console.log('Navigation to:', section);
            }
        }

        // Smooth scroll to section
        function scrollToSection(sectionId) {
            const section = document.getElementById(sectionId) || document.querySelector(`.${sectionId}`);
            if (section) {
                section.scrollIntoView({ 
                    behavior: 'smooth',
                    block: 'start'
                });
            } else {
                // If section not found on current page, redirect to home with hash
                window.location.href = "{% url 'home' %}#" + sectionId;
            }
        }

        // Program Cards Navigation
            const programCards = document.querySelectorAll('.program-card');
            const navArrows = document.querySelectorAll('.nav-arrow');
            
            if (programCards.length > 0 && navArrows.length > 0) {
                let currentActiveIndex = 1; // Start with center card (index 1)
                
                function updateActiveCard(newIndex) {
                    // Hide all cards first
                    programCards.forEach(card => {
                        card.style.display = 'none';
                    });
                    
                    // Calculate which cards to show (3 cards: left, center, right)
                    const leftIndex = (newIndex - 1 + programCards.length) % programCards.length;
                    const centerIndex = newIndex;
                    const rightIndex = (newIndex + 1) % programCards.length;
                    
                    // Show the three cards
                    const leftCard = programCards[leftIndex];
                    const centerCard = programCards[centerIndex];
                    const rightCard = programCards[rightIndex];
                    
                    // Reset all card classes and styles
                    programCards.forEach((card, index) => {
                        const title = card.querySelector('h3');
                        const button = card.querySelector('.btn');
                        const arrow = card.querySelector('.nav-arrow');
                        
                        // Remove all classes
                        card.classList.remove('side', 'center');
                        title.classList.remove('active-title');
                        button.classList.remove('blue');
                        button.classList.add('gray');
                        
                        // Remove arrows from all cards
                        if (arrow) {
                            arrow.remove();
                        }
                    });
                    
                    // Setup left card
                    leftCard.style.display = 'block';
                    leftCard.classList.add('side');
                    const leftArrow = document.createElement('div');
                    leftArrow.className = 'nav-arrow left';
                    leftArrow.innerHTML = '&#8249;';
                    leftCard.querySelector('.image-container').appendChild(leftArrow);
                    
                    // Setup center card
                    centerCard.style.display = 'block';
                    centerCard.classList.add('center');
                    const centerTitle = centerCard.querySelector('h3');
                    const centerButton = centerCard.querySelector('.btn');
                    centerTitle.classList.add('active-title');
                    centerButton.classList.remove('gray');
                    centerButton.classList.add('blue');
                    
                    // Setup right card
                    rightCard.style.display = 'block';
                    rightCard.classList.add('side');
                    const rightArrow = document.createElement('div');
                    rightArrow.className = 'nav-arrow right';
                    rightArrow.innerHTML = '&#8250;';
                    rightCard.querySelector('.image-container').appendChild(rightArrow);
                    
                    // Re-attach event listeners to new arrows
                    const newArrows = document.querySelectorAll('.nav-arrow');
                    newArrows.forEach(arrow => {
                        arrow.addEventListener('click', function() {
                            if (arrow.classList.contains('left')) {
                                currentActiveIndex = (currentActiveIndex - 1 + programCards.length) % programCards.length;
                            } else if (arrow.classList.contains('right')) {
                                currentActiveIndex = (currentActiveIndex + 1) % programCards.length;
                            }
                            updateActiveCard(currentActiveIndex);
                        });
                    });
                }
                
                // Initialize with first three cards
                updateActiveCard(currentActiveIndex);
            }
        });
    </script>
</body>
</html>
